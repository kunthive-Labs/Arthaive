name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    name: Lint, typecheck & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      # Run the real production build so app-router codegen, metadata, and the
      # prebuild data-generation step are exercised in CI — not only on Vercel.
      # A failed deploy should never be the first signal of breakage.
      - name: Build
        run: npm run build
